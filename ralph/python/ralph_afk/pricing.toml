# Pricing estimates as of 2026-05-16. PROVIDER LIST PRICES, not GitHub Copilot's
# premium-request billing. The Copilot CLI bills on a premium-request quota that
# the SDK does not expose; the figures below are useful for cost-shape signal
# only. The renderer surfaces every cost figure with this caveat alongside.
#
# Override this packaged file at runtime via the environment variable
# RALPH_PRICING_FILE=/path/to/your.toml (see ralph_afk.pricing.load_pricing).
#
# Schema: every entry under [models."<name>"] must define:
#   input_per_mtok   — USD per million input tokens (Decimal-parseable scalar)
#   output_per_mtok  — USD per million output tokens (Decimal-parseable scalar)
#   context_window   — model context window in tokens (positive integer)
#
# Naming: keys are the model identifiers exposed by the Copilot CLI (see the
# kit-wide MODEL env var). Adding or removing entries here does NOT change the
# runner's behaviour for unknown models — pricing.estimate_cost returns None
# for any model not present in this table so the renderer can show "—".

[models."claude-opus-4.7-xhigh"]
input_per_mtok  = 15.00
output_per_mtok = 75.00
context_window  = 200_000

[models."claude-sonnet-4.6"]
input_per_mtok  = 3.00
output_per_mtok = 15.00
context_window  = 200_000

[models."gpt-5.4"]
input_per_mtok  = 1.25
output_per_mtok = 10.00
context_window  = 256_000

[models."gpt-5-mini"]
input_per_mtok  = 0.25
output_per_mtok = 2.00
context_window  = 256_000
